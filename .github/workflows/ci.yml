name: CI

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure Maven settings
        uses: bloomreach-forge/ci-workflows/.github/actions/configure-maven-settings@v1.0.4
        with:
          username: ${{ secrets.BR_MAVEN_USERNAME }}
          password: ${{ secrets.BR_MAVEN_PASSWORD }}

      - name: Verify versions are aligned
        run: |
          ROOT_VERSION=$(awk -F'[<>]' '/<parent>/,/<\/parent>/{next} /<version>/{print $3; exit}' pom.xml)
          DEMO_VERSION=$(awk -F'[<>]' '/<parent>/,/<\/parent>/{next} /<version>/{print $3; exit}' demo/pom.xml)
          echo "Root: $ROOT_VERSION, Demo: $DEMO_VERSION"
          if [ "$ROOT_VERSION" != "$DEMO_VERSION" ]; then
            echo "ERROR: Root version '$ROOT_VERSION' does not match demo version '$DEMO_VERSION'"
            exit 1
          fi

      - name: Build and test
        run: mvn -B clean install
        env:
          BR_MAVEN_USERNAME: ${{ secrets.BR_MAVEN_USERNAME }}
          BR_MAVEN_PASSWORD: ${{ secrets.BR_MAVEN_PASSWORD }}

      - name: Build and test demo
        run: mvn -B -f demo clean verify
        env:
          BR_MAVEN_USERNAME: ${{ secrets.BR_MAVEN_USERNAME }}
          BR_MAVEN_PASSWORD: ${{ secrets.BR_MAVEN_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: '**/target/surefire-reports/'
