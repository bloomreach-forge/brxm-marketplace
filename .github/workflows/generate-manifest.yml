name: Generate Addons Manifest

on:
  # Manual trigger
  workflow_dispatch:
  # Scheduled daily rebuild (runs on default branch)
  schedule:
    - cron: '0 6 * * *'
  # On push to main (gitflow: production releases)
  push:
    branches: [main]
    paths:
      - '.github/workflows/generate-manifest.yml'
      - 'manifest-generator/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For scheduled runs on develop, checkout main for production manifest
          ref: ${{ github.event_name == 'schedule' && 'main' || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        uses: bloomreach-forge/ci-workflows/.github/actions/configure-maven-settings@v1.0.4
        with:
          username: ${{ secrets.BR_MAVEN_USERNAME }}
          password: ${{ secrets.BR_MAVEN_PASSWORD }}

      - name: Build manifest generator
        run: mvn -B package -pl manifest-generator -am -DskipTests
        env:
          BR_MAVEN_USERNAME: ${{ secrets.BR_MAVEN_USERNAME }}
          BR_MAVEN_PASSWORD: ${{ secrets.BR_MAVEN_PASSWORD }}

      - name: Generate manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          java -jar manifest-generator/target/manifest-generator.jar \
            --org bloomreach-forge \
            --output docs/addons-index.json \
            --token "$GITHUB_TOKEN" \
            --verbose

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: addons-manifest
          path: docs/addons-index.json
          if-no-files-found: warn

      - name: Deploy manifest to gh-pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save generated manifest
          cp docs/addons-index.json /tmp/addons-index.json

          # Switch to gh-pages (create if needed)
          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git checkout gh-pages

          # Update manifest
          cp /tmp/addons-index.json addons-index.json
          git add addons-index.json
          git diff --staged --quiet || git commit -m "chore: regenerate addons-index.json"
          git push origin gh-pages
